name: Feature Request
description: Suggest a new tool or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I need to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the tool or change you'd like
      placeholder: |
        Tool name: `do_something`
        Cloudflare API endpoint: `GET/POST /client/v4/endpoint`
        Parameters: ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?

  - type: dropdown
    id: scope
    attributes:
      label: Tool Category
      description: Which area does this feature belong to?
      options:
        - Zones
        - DNS
        - Transform Rules
        - Page Rules
        - Cache
        - Analytics
        - WAF
        - New Category
    validations:
      required: true

  - type: dropdown
    id: cf_api
    attributes:
      label: Cloudflare API Reference
      description: Does this correspond to an existing Cloudflare API endpoint?
      options:
        - "Yes - documented in Cloudflare API"
        - "No - new behavior / aggregation"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information or examples
